name: flutter_voice_chatbot
description: A Flutter web chatbot with voice playback using just_audio.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  just_audio_web: ^0.4.16
  http: ^1.2.1
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  uuid: ^4.4.0
  intl: ^0.19.0
  web: ^1.1.0
  record: ^5.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
