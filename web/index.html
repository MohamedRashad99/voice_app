<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Voice Chatbot">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VoiceChat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>VoiceChat · AI Assistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0d0f14;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0d0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
      transition: opacity 0.5s ease;
    }
    .loader-ring {
      width: 56px;
      height: 56px;
      border: 3px solid #1e2130;
      border-top-color: #7c6cfc;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Initializing Voice AI</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() { loader.remove(); }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
